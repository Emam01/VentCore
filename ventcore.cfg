#####################################################################
#   Chamber Exhaust Fan (PA8)
#
#   This header used to belong to the stock [purifier] module (now
#   disabled in printer.cfg / Klipper_code.txt). The electrical
#   settings below (inversion, cycle_time, hardware_pwm, and the
#   PE15 power-enable pin) are carried over from that block so the
#   same physical driver circuitry on the mainboard is still powered
#   and addressed correctly.
#
#   - Watches all 4 hotends (extruder, extruder1, extruder2, extruder3)
#   - Turns on when ANY hotend is >= 50C, off when ALL are < 50C
#   - Speed while on is picked from the MATERIALS table below
#   - AUTO / MANUAL mode, with a working Fluidd slider in MANUAL
#####################################################################

# ------------------------- Fan hardware ---------------------------

# The stock [purifier] block gated 24V to this header through
# power_enable_pin: PE15 - a plain enable line, no ID-resistor/
# detection logic tied to it (that was power_det_pin: PA7, used only
# to sense whether the genuine accessory board was present, and
# isn't needed for a generic fan). Driving PE15 high unconditionally
# re-creates that "power on" state so the PWM signal on PA8 actually
# has something to switch.
#
# Left on at all times, not scoped to only while printing: the
# exhaust fan can still be needed when a hotend is heated manually
# outside of a formal print (maintenance, preheating, nozzle
# cleaning), and an always-on rail trivially covers "on during
# printing" as well.
#
# Polarity note: the original block used PE15 with no "!" (unlike
# exhaust_pin, which was inverted), so this assumes active-high =
# powered. I can't confirm that against a schematic - if the fan
# stays dead after this, or only runs at full speed regardless of
# commanded SPEED, try `pin: !PE15` instead.
#
# shutdown_value: 0 (Klipper's normal default) - on an emergency
# stop or MCU disconnect this rail, and the fan with it, cuts out
# along with everything else.
[output_pin fan_header_power_enable]
pin: PE15
value: 1
shutdown_value: 0

[fan_generic chamber_exhaust]
pin: !PA8
max_power: 1.0
cycle_time: 0.001
hardware_pwm: True
kick_start_time: 0.5
shutdown_speed: 0.0

# ------------------ Chamber exhaust: persistent state ---------------
# mode: "auto" (temperature/material driven) or "manual" (slider only)

[gcode_macro _CHAMBER_FAN_VARS]
variable_mode: "auto"
variable_material: "PLA"
gcode:
    # Storage only - do not run this macro directly.

# ---- Material -> chamber fan speed (0.0-1.0). Edit freely. ----
#   PLA 0%   PETG 25%   TPU 0%   ABS 80%   ASA 80%   PC 100%
#   NYLON/PA 100%   PET-CF 40%   ABS-CF 90%   ASA-CF 90%   PC-CF 100%
# Unrecognised materials fall back to 50% (safer to over- than
# under-ventilate for a material this table doesn't know about).

[gcode_macro _CHAMBER_FAN_UPDATE]
gcode:
    {% set vars = printer["gcode_macro _CHAMBER_FAN_VARS"] %}
    {% if vars.mode == "auto" %}
        {% set speeds = {
            'PLA':    0.00,
            'PETG':   0.25,
            'TPU':    0.00,
            'ABS':    0.80,
            'ASA':    0.80,
            'PC':     1.00,
            'NYLON':  1.00,
            'PA':     1.00,
            'PET-CF': 0.40,
            'ABS-CF': 0.90,
            'ASA-CF': 0.90,
            'PC-CF':  1.00 } %}
        {% set t0 = (printer['extruder'].temperature|default(0)) if printer['extruder'] is defined else 0 %}
        {% set t1 = (printer['extruder1'].temperature|default(0)) if printer['extruder1'] is defined else 0 %}
        {% set t2 = (printer['extruder2'].temperature|default(0)) if printer['extruder2'] is defined else 0 %}
        {% set t3 = (printer['extruder3'].temperature|default(0)) if printer['extruder3'] is defined else 0 %}
        {% set max_temp = [t0, t1, t2, t3]|max %}
        {% set target = (speeds.get(vars.material|upper, 0.50) if max_temp >= 50 else 0.0) %}
        {% set current_speed = printer['fan_generic chamber_exhaust'].speed %}
        {% if target|round(3) != current_speed|round(3) %}
            SET_FAN_SPEED FAN=chamber_exhaust SPEED={target}
        {% endif %}
    {% endif %}

[delayed_gcode _CHAMBER_FAN_LOOP]
initial_duration: 2
gcode:
    _CHAMBER_FAN_UPDATE
    UPDATE_DELAYED_GCODE ID=_CHAMBER_FAN_LOOP DURATION=2

# ------------------ Chamber exhaust: user controls -------------------
# These show up as clickable buttons in Fluidd's "Macros" panel.

[gcode_macro CHAMBER_FAN_AUTO]
description: Chamber exhaust -> automatic temperature/material control
gcode:
    SET_GCODE_VARIABLE MACRO=_CHAMBER_FAN_VARS VARIABLE=mode VALUE='"auto"'
    _CHAMBER_FAN_UPDATE
    RESPOND MSG="Chamber exhaust: AUTO"

[gcode_macro CHAMBER_FAN_MANUAL]
description: Chamber exhaust -> manual control (use the Fluidd fan slider)
gcode:
    SET_GCODE_VARIABLE MACRO=_CHAMBER_FAN_VARS VARIABLE=mode VALUE='"manual"'
    RESPOND MSG="Chamber exhaust: MANUAL - use the fan slider"

[gcode_macro SET_CHAMBER_FAN_MATERIAL]
description: Set active material for chamber-fan auto speed. Usage: SET_CHAMBER_FAN_MATERIAL MATERIAL=PLA
gcode:
    {% set material = (params.MATERIAL|default("PLA"))|string|upper %}
    SET_GCODE_VARIABLE MACRO=_CHAMBER_FAN_VARS VARIABLE=material VALUE='"{material}"'
    _CHAMBER_FAN_UPDATE
    RESPOND MSG="Chamber fan material set to {material}"

[gcode_macro CHAMBER_FAN_STATUS]
description: Report chamber exhaust mode/material/current speed
gcode:
    {% set vars = printer["gcode_macro _CHAMBER_FAN_VARS"] %}
    RESPOND MSG="Chamber exhaust: mode={vars.mode} material={vars.material} speed={(printer['fan_generic chamber_exhaust'].speed * 100)|round|int}%"
